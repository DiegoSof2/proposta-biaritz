<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biaritz — Produto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style> body { background: var(--white); } </style>
</head>
<body data-page="produto">
  <header class="hdr">
    <div class="brand">BIARITZ</div>
    <nav>
      <a class="off" aria-disabled="true">Coleção</a>
      <a class="active" href="index.html">Catálogo</a>
      <a class="off" aria-disabled="true">Revendedores</a>
      <a class="off" aria-disabled="true">Sobre</a>
      <a class="off" aria-disabled="true">Contato</a>
    </nav>
    <button class="btn-pedido" id="btnPedido">
      <svg width="16" height="16" viewBox="0 0 20 20" fill="none"><path d="M2 3h2l1.5 9h9l1.5-7H5" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/><circle cx="7" cy="16" r="1.2" fill="currentColor"/><circle cx="14" cy="16" r="1.2" fill="currentColor"/></svg>
      Pedido <span class="ped-count" id="pedidoCount">0</span>
    </button>
  </header>

  <div class="crumb"><a href="index.html">← Voltar ao catálogo</a></div>
  <main class="product" id="product"></main>
  <section class="sugestoes" id="sugestoes" hidden>
    <div class="sug-head">Você também pode gostar</div>
    <div class="sug-grid" id="sugGrid"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
